<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>{% block title %}Warroom{% endblock %}</title>
<meta name="theme-color" content="#07090d">
<link rel="manifest" href="/static/manifest.webmanifest?v={{ asset_v }}">
<link rel="icon" href="/static/icon-raider.png">
<link rel="apple-touch-icon" href="/static/icon-raider.png">
<link rel="preload" href="/static/fonts/germania-one.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="/static/style.css?v={{ asset_v }}">
{% block head %}{% endblock %}
</head>
<body class="{% block bodyclass %}{% endblock %}">
{% block content %}{% endblock %}
<script>
if ('serviceWorker' in navigator) {
  // Von der Wurzel registrieren — sonst ist der Scope /static/ und die App unter /
  // wird nicht kontrolliert (serviceWorker.ready haengt, Push/Offline tot).
  navigator.serviceWorker.register('/sw.js', {scope: '/'}).catch(function () {});
  // Alt-Registrierung mit /static/-Scope abraeumen
  navigator.serviceWorker.getRegistrations().then(function (rs) {
    rs.forEach(function (r) { if (/\/static\/$/.test(r.scope)) r.unregister(); });
  }).catch(function () {});
}
</script>
</body>
</html>
